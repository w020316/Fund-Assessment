app = "fund-assessment"
primary_region = "sin"

[build]
  dockerfile = "Dockerfile"

[deploy]
  strategy = "rolling"

[http_service]
  internal_port = 8000
  force_https = true
  auto_stop_machines = "off"
  auto_start_machines = true
  min_machines_running = 1

[http_service.concurrency]
  type = "connections"
  hard_limit = 200
  soft_limit = 150

[[vm]]
  memory = "512mb"
  cpu_kind = "shared"
  cpus = 1

[env]
  PYTHONPATH = "/app"
  PYTHONUNBUFFERED = "1"
  HOST = "0.0.0.0"
  PORT = "8000"
